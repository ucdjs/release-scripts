name: GitHub Actions Security Analysis

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "renovate/**"
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  zizmor:
    uses: luxass/shared-workflows/.github/workflows/ci-security.yaml@a25bf7725dc069a2a7605ac267d6cde4e0025fbe # v0.4.0
    permissions:
      contents: read
      security-events: write
      id-token: write
    with:
      zizmor-version: v1.23.1
