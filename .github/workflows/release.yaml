name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    uses: luxass/shared-workflows/.github/workflows/release-npm.yaml@1da57045a6e7f913231d1edfb21d95de9e3eeaad # v0.4.1
    permissions:
      contents: write
      id-token: write
    with:
      environment: npm-registry
      publish-args: --access public --no-git-checks
